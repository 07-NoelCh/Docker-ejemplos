version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: mi_base
      MYSQL_USER: usuario
      MYSQL_PASSWORD: userpass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "8080:80"

  php:
    image: php:8.2-apache
    container_name: php_app
    restart: always
    depends_on:
      - db
    ports:
      - "8000:80"
    volumes:
      - ./www:/var/www/html
    command: >
      bash -c "docker-php-ext-install mysqli && apache2-foreground"

volumes:
  db_data:
